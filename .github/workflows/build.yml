name: Build and Release
on:
  push:
    branches:
      - main

# Prevent overlapping runs from racing on tag/version numbers.
concurrency:
  group: build-and-release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    if: github.repository_owner == 'MCCitiesClone'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Determine next version
        id: version
        run: |
          set -euo pipefail
          # Latest release tag, if any (semver-sorted).
          latest="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -n1 || true)"
          if [ -z "$latest" ]; then
            # No tags yet: seed from the version declared in build.gradle.kts.
            base="$(grep -m1 -E '^version = ' build.gradle.kts | sed -E 's/.*"([0-9]+\.[0-9]+\.[0-9]+).*"/\1/')"
            version="$base"
          else
            # Bump the patch component of the latest tag.
            v="${latest#v}"
            major="${v%%.*}"
            rest="${v#*.}"
            minor="${rest%%.*}"
            patch="${rest#*.}"
            version="${major}.${minor}.$((patch + 1))"
          fi
          echo "Building version $version (previous tag: ${latest:-none})"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Set project version
        run: |
          set -euo pipefail
          sed -i -E "s/^version = \"[^\"]+\"/version = \"${{ steps.version.outputs.version }}\"/" build.gradle.kts
          grep -E '^version = ' build.gradle.kts

      - name: Clean Build
        run: ./gradlew clean build

      - name: Collect artifacts
        id: artifacts
        run: |
          set -euo pipefail
          mkdir -p release-artifacts
          find . -path '*/build/libs/plotsquared-*-${{ steps.version.outputs.version }}.jar' \
            ! -name '*-sources.jar' ! -name '*-javadoc.jar' \
            -exec cp -v {} release-artifacts/ \;
          echo "Artifacts:"
          ls -1 release-artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: PlotSquared ${{ steps.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: release-artifacts/*.jar
